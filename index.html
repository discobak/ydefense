<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>IDAP</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(270deg, #0f2027, #203a43, #2c5364);
      background-size: 600% 600%;
      animation: gradientMove 15s ease infinite;
      color: #fff;
    }
    @keyframes gradientMove {
      0% {background-position:0% 50%}
      50% {background-position:100% 50%}
      100% {background-position:0% 50%}
    }
    header {
      text-align: center;
      padding: 40px 20px;
    }
    header h1 {
      font-size: 2.5em;
      margin: 0;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #1c1c1c;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      background: #2c2c2c;
      color: #fff;
    }
    button {
      background: #ff3b3b;
      color: #fff;
      border: none;
      padding: 15px 25px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1em;
      transition: background 0.3s;
    }
    button:hover {
      background: #cc2c2c;
    }
    .alert-card {
      margin-top: 30px;
      padding: 20px;
      border-radius: 10px;
      background: #2c2c2c;
      border-left: 6px solid #ff3b3b;
    }
    .alert-card h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1> IDAP </h1>
    <p>Integração de Dados de Alertas Públicos </p>
  </header>

  <div class="container">
    <form id="alertForm">
      <label for="gravidade">Gravidade</label>
      <select id="gravidade" required>
        <option value="">Selecione...</option>
        <option value="Extremo">Extremo</option>
        <option value="Severo">Severo</option>
        <option value="Mínimo">Mínimo</option>
      </select>

      <label for="razao">RConteúdo</label>
      <textarea id="razao" rows="3" placeholder="Descreva a razão..." required></textarea>

      <label for="estado">Estado</label>
      <select id="estado" required>
        <option value="">Selecione...</option>
        <option>Acre</option><option>Alagoas</option><option>Amapá</option><option>Amazonas</option>
        <option>Bahia</option><option>Ceará</option><option>Distrito Federal</option><option>Espírito Santo</option>
        <option>Goiás</option><option>Maranhão</option><option>Mato Grosso</option><option>Mato Grosso do Sul</option>
        <option>Minas Gerais</option><option>Pará</option><option>Paraíba</option><option>Paraná</option>
        <option>Pernambuco</option><option>Piauí</option><option>Rio de Janeiro</option><option>Rio Grande do Norte</option>
        <option>Rio Grande do Sul</option><option>Rondônia</option><option>Roraima</option><option>Santa Catarina</option>
        <option>São Paulo</option><option>Sergipe</option><option>Tocantins</option>
      </select>

      <button type="submit">Enviar</button>
    </form>

    <div id="alertaResultado"></div>
  </div>

  <script>
    const form = document.getElementById('alertForm');
    const resultado = document.getElementById('alertaResultado');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const gravidade = document.getElementById('gravidade').value;
      const razao = document.getElementById('razao').value;
      const estado = document.getElementById('estado').value;

      resultado.innerHTML = `
        <div class="alert-card">
          <h2>Alerta Enviado.</h2>
          <p><strong>Gravidade:</strong> ${gravidade}</p>
          <p><strong>Razão:</strong> ${razao}</p>
          <p><strong>Estado:</strong> ${estado}</p>
        </div>
      `;
      form.reset();
    });
  </script>
</body>
</html>
