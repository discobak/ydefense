<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IDAP - Interface de Divulgação de Alertas Públicos</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  :root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #333333;
    --border: #e5e5e5;
    --input-bg: #ffffff;
    --banner: #1b8f3c;
    --alerta: #ef6c42;
    --alerta-hover: #d95a31;
    --overlay: rgba(0, 0, 0, 0.45);
  }

  body.dark-mode {
    --bg: #121212;
    --card: #1f1f1f;
    --text: #e5e5e5;
    --border: #333333;
    --input-bg: #2b2b2b;
    --overlay: rgba(0, 0, 0, 0.7);
  }

  body {
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
  }

  /* Banner */

  .banner {
    width: 100%;
    background: var(--banner);
    color: #fff;
    padding: 24px 40px;
    box-shadow: 0 2px 10px rgba(0,0,0,.2);
  }

  .banner-content {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .banner-title {
    font-size: 34px;
    font-weight: bold;
    letter-spacing: 2px;
  }

  .banner-subtitle {
    font-size: 20px;
  }

  /* Conteúdo */

  .container {
    max-width: 700px;
    margin: 30px auto;
    background: var(--card);
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
  }

  h2 {
    margin-bottom: 25px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
  }

  textarea,
  select {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    background: var(--input-bg);
    color: var(--text);
    border-radius: 6px;
    font-size: 15px;
  }

  textarea {
    resize: vertical;
  }

  /* Botões */

  .btn,
  .btn-avancar {
    border: none;
    background: var(--alerta);
    color: white;
    padding: 12px 24px;
    min-width: 170px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 0;
    transition: 0.2s;
  }

  .btn:hover,
  .btn-avancar:hover {
    background: var(--alerta-hover);
  }

  /* Modal */

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .modal-content {
    width: 90%;
    max-width: 650px;
    background: var(--card);
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,.25);
  }

  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 18px;
    font-weight: bold;
  }

  .modal-body {
    padding: 20px;
  }

  .alerta-box {
    background: var(--alerta);
    color: white;
    padding: 18px;
    margin-bottom: 25px;
    text-align: center;
  }

  .alerta-titulo {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .alerta-razao {
    font-size: 18px;
  }

  .subtitulo {
    text-align: center;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  .devices {
    display: flex;
    justify-content: center;
    gap: 70px;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }

  .device-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 180px;
    cursor: pointer;
  }

  .device-option img {
    width: 100px;
    height: 100px;
    margin-bottom: 10px;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 15px 20px;
    border-top: 1px solid var(--border);
  }

  #resultadoEnvio {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
  }

  /* Botão de tema */

  .theme-toggle {
    position: fixed;
    right: 25px;
    bottom: 25px;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 50%;
    background: var(--banner);
    color: white;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.3);
    z-index: 10000;
    transition: transform 0.3s;
  }

  .theme-toggle:hover {
    transform: rotate(45deg);
  }
</style>
</head>

<body>

<div class="banner">
  <div class="banner-content">
    <div class="banner-title">IDAP</div>
    <div class="banner-subtitle">- Interface de Divulgação de Alertas Públicos</div>
  </div>
</div>

<div class="container">

  <h2>Criar Alerta</h2>

  <form id="alertaForm">

    <label for="severidade">Severidade</label>

    <select id="severidade" required>
      <option value="">Selecione...</option>
      <option>Baixa</option>
      <option>Média</option>
      <option>Alta</option>
      <option>Muito Alta</option>
      <option>Extrema</option>
    </select>

    <label for="razao">Razão do Alerta</label>

    <textarea
      id="razao"
      rows="4"
      placeholder="Descreva a razão..."
      required></textarea>

    <label for="estado">Estado</label>

    <select id="estado" required>
      <option value="">Selecione...</option>
      <option>Acre</option>
      <option>Alagoas</option>
      <option>Amapá</option>
      <option>Amazonas</option>
      <option>Bahia</option>
      <option>Ceará</option>
      <option>Distrito Federal</option>
      <option>Espírito Santo</option>
      <option>Goiás</option>
      <option>Maranhão</option>
      <option>Mato Grosso</option>
      <option>Mato Grosso do Sul</option>
      <option>Minas Gerais</option>
      <option>Pará</option>
      <option>Paraíba</option>
      <option>Paraná</option>
      <option>Pernambuco</option>
      <option>Piauí</option>
      <option>Rio de Janeiro</option>
      <option>Rio Grande do Norte</option>
      <option>Rio Grande do Sul</option>
      <option>Rondônia</option>
      <option>Roraima</option>
      <option>Santa Catarina</option>
      <option>São Paulo</option>
      <option>Sergipe</option>
      <option>Tocantins</option>
    </select>

    <button type="submit" class="btn-avancar">
      Avançar
    </button>

  </form>

</div>

<div id="modalEnvio" class="modal">

  <div class="modal-content">

    <div class="modal-header">
      Confirmação do envio do alerta IDAP
    </div>

    <div class="modal-body">

      <div class="alerta-box" id="alertaResumo"></div>

      <p class="subtitulo">Selecione para onde enviar:</p>

      <div class="devices">

        <label class="device-option">
          <img src="https://img.icons8.com/ios-filled/100/000000/smartphone.png" alt="Celular">

          <div>
            <input type="checkbox" id="sendCelular">
            Celular
          </div>
        </label>

        <label class="device-option">
          <img src="https://img.icons8.com/ios-filled/100/000000/computer.png" alt="Computadores com IDAP Perk">

          <div>
            <input type="checkbox" id="sendPC">
            Computadores com IDAP Perk
          </div>
        </label>

      </div>

      <div id="resultadoEnvio"></div>

    </div>

    <div class="modal-footer">

      <button type="button" class="btn" onclick="voltar()">
        Voltar
      </button>

      <button type="button" class="btn" onclick="confirmarEnvio()">
        Confirmar envio
      </button>

    </div>

  </div>

</div>

<button id="themeToggle" class="theme-toggle" title="Alterar tema">
  ⚙️
</button>

<script>
  const form = document.getElementById("alertaForm");
  const modal = document.getElementById("modalEnvio");
  const themeToggle = document.getElementById("themeToggle");

  // Carrega tema salvo
  if (localStorage.getItem("temaIDAP") === "escuro") {
    document.body.classList.add("dark-mode");
  }

  // Alterna tema
  themeToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");

    const tema = document.body.classList.contains("dark-mode")
      ? "escuro"
      : "claro";

    localStorage.setItem("temaIDAP", tema);
  });

  // Abre modal
  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const severidade = document.getElementById("severidade").value;
    const razao = document.getElementById("razao").value;

    document.getElementById("alertaResumo").innerHTML = `
      <div class="alerta-titulo">
        ⚠️ Alerta ${severidade}
      </div>

      <div class="alerta-razao">
        ${razao}
      </div>
    `;

    modal.style.display = "flex";
  });

  // Fecha modal
  function voltar() {
    modal.style.display = "none";
    document.getElementById("resultadoEnvio").innerHTML = "";
  }

  // Confirma envio
  function confirmarEnvio() {
    const celular = document.getElementById("sendCelular").checked;
    const pc = document.getElementById("sendPC").checked;
    const resultado = document.getElementById("resultadoEnvio");

    if (!celular && !pc) {
      resultado.style.color = "#d32f2f";
      resultado.innerHTML = "Selecione pelo menos um destino.";
      return;
    }

    const dispositivos = [];

    if (celular) dispositivos.push("Celular");
    if (pc) dispositivos.push("Computadores com IDAP Perk");

    resultado.style.color = "#2e7d32";
    resultado.innerHTML =
      "Alerta enviado para: " + dispositivos.join(", ");
  }
</script>

</body>
</html>
