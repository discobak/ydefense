<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IDAP - Sistema de Alertas</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #f4f6f9;
  }

  .banner {
    background: #c62828;
    color: #fff;
    text-align: center;
    padding: 24px;
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 4px;
    box-shadow: 0 2px 10px rgba(0,0,0,.2);
  }

  .container {
    max-width: 700px;
    margin: 30px auto;
    background: #fff;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(0,0,0,.1);
  }

  h2 {
    color: #333;
    margin-bottom: 25px;
  }

  label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #444;
  }

  textarea,
  select {
    width: 100%;
    padding: 12px;
    border: 1px solid #d5d5d5;
    border-radius: 6px;
    margin-bottom: 20px;
    font-size: 15px;
  }

  textarea {
    resize: vertical;
  }

  .btn-avancar {
    background: #00a884;
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
  }

  .btn-avancar:hover {
    background: #008f71;
  }

  /* Modal */

  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .modal-content {
    width: 90%;
    max-width: 650px;
    background: #fff;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,.25);
  }

  .modal-header {
    padding: 18px 20px;
    border-bottom: 1px solid #e5e5e5;
    color: #666;
    font-size: 18px;
    font-weight: bold;
  }

  .modal-body {
    padding: 20px;
  }

  .alerta-box {
    background: #ef6c42;
    color: #fff;
    padding: 14px;
    border-radius: 4px;
    font-weight: bold;
    margin-bottom: 25px;
    text-align: center;
  }

  .subtitulo {
    text-align: center;
    color: #888;
    margin-bottom: 20px;
  }

  .devices {
    display: flex;
    justify-content: center;
    gap: 70px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .device-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    text-align: center;
    max-width: 180px;
  }

  .device-option img {
    width: 100px;
    height: 100px;
    margin-bottom: 10px;
  }

  .device-option input {
    margin-right: 6px;
  }

  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 15px 20px;
    border-top: 1px solid #e5e5e5;
  }

  .btn {
    border: none;
    padding: 10px 18px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }

  .btn-voltar {
    background: #f4b400;
    color: #fff;
  }

  .btn-confirmar {
    background: #4caf50;
    color: #fff;
  }

  #resultadoEnvio {
    margin-top: 15px;
    text-align: center;
    font-weight: bold;
  }
</style>
</head>

<body>

<div class="banner">
  IDAP
</div>

<div class="container">

  <h2>Criar Alerta</h2>

  <form id="alertaForm">

    <label for="severidade">Severidade</label>

    <select id="severidade" required>
      <option value="">Selecione...</option>
      <option>Baixa</option>
      <option>Média</option>
      <option>Alta</option>
      <option>Muito Alta</option>
      <option>Extrema</option>
    </select>

    <label for="razao">Razão do Alerta</label>

    <textarea
      id="razao"
      rows="3"
      placeholder="Descreva a razão..."
      required></textarea>

    <label for="estado">Estado</label>

    <select id="estado" required>
      <option value="">Selecione...</option>
      <option>Acre</option>
      <option>Alagoas</option>
      <option>Amapá</option>
      <option>Amazonas</option>
      <option>Bahia</option>
      <option>Ceará</option>
      <option>Distrito Federal</option>
      <option>Espírito Santo</option>
      <option>Goiás</option>
      <option>Maranhão</option>
      <option>Mato Grosso</option>
      <option>Mato Grosso do Sul</option>
      <option>Minas Gerais</option>
      <option>Pará</option>
      <option>Paraíba</option>
      <option>Paraná</option>
      <option>Pernambuco</option>
      <option>Piauí</option>
      <option>Rio de Janeiro</option>
      <option>Rio Grande do Norte</option>
      <option>Rio Grande do Sul</option>
      <option>Rondônia</option>
      <option>Roraima</option>
      <option>Santa Catarina</option>
      <option>São Paulo</option>
      <option>Sergipe</option>
      <option>Tocantins</option>
    </select>

    <button type="submit" class="btn-avancar">
      Avançar
    </button>

  </form>

</div>

<div id="modalEnvio" class="modal">

  <div class="modal-content">

    <div class="modal-header">
      Confirmação do envio do alerta IDAP
    </div>

    <div class="modal-body">

      <div class="alerta-box" id="alertaResumo">
        ⚠️ Alerta IDAP
      </div>

      <p class="subtitulo">Selecione para onde enviar:</p>

      <div class="devices">

        <label class="device-option">
          <img src="https://img.icons8.com/ios-filled/100/000000/smartphone.png" alt="Celular">

          <div>
            <input type="checkbox" id="sendCelular">
            Celular
          </div>
        </label>

        <label class="device-option">
          <img src="https://img.icons8.com/ios-filled/100/000000/computer.png" alt="Computador">

          <div>
            <input type="checkbox" id="sendPC">
            Computadores com IDAP Perk
          </div>
        </label>

      </div>

      <div id="resultadoEnvio"></div>

    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-voltar" onclick="voltar()">
        Voltar
      </button>

      <button type="button" class="btn btn-confirmar" onclick="confirmarEnvio()">
        Confirmar envio
      </button>
    </div>

  </div>

</div>

<script>
  const form = document.getElementById("alertaForm");
  const modal = document.getElementById("modalEnvio");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const severidade = document.getElementById("severidade").value;
    const razao = document.getElementById("razao").value;

    document.getElementById("alertaResumo").innerHTML =
      `⚠️ ${razao}<br>Severidade: <strong>${severidade}</strong>`;

    modal.style.display = "flex";
  });

  function voltar() {
    modal.style.display = "none";
    document.getElementById("resultadoEnvio").innerHTML = "";
  }

  function confirmarEnvio() {
    const celular = document.getElementById("sendCelular").checked;
    const pc = document.getElementById("sendPC").checked;
    const resultado = document.getElementById("resultadoEnvio");

    if (!celular && !pc) {
      resultado.style.color = "#d32f2f";
      resultado.innerHTML = "Selecione pelo menos um destino.";
      return;
    }

    const dispositivos = [];

    if (celular) dispositivos.push("Celular");
    if (pc) dispositivos.push("Computadores com IDAP Perk");

    resultado.style.color = "#2e7d32";
    resultado.innerHTML =
      "Alerta enviado para: " + dispositivos.join(", ");
  }
</script>

</body>
</html>
